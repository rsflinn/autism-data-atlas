<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pelagic Specimen — Glass Brain</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --abyss: #051438;
    --deep:  #0a2868;
    --cobalt:#0c3b8a;
    --lapis: #1860c4;
    --glow:  #4ea3e8;
    --mist:  #9bc4f5;
    --coral: #f76c4e;
    --amber: #f4a259;
    --cream: #fbecd1;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: var(--abyss);
    color: var(--cream);
    font-family: 'Inter', system-ui, sans-serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Deep-water gradient field */
  .stage {
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 78% 60% at 50% 38%,
        var(--lapis)  0%,
        var(--cobalt) 38%,
        var(--deep)   72%,
        var(--abyss)  100%);
  }
  /* Diagonal light shafts */
  .stage::before {
    content: "";
    position: absolute; inset: -10%;
    background:
      linear-gradient(116deg, rgba(155,196,245,0.10) 0%, transparent 22%),
      linear-gradient(126deg, rgba(155,196,245,0.06) 8%, transparent 28%);
    mix-blend-mode: screen;
    pointer-events: none;
  }

  .snow-layer {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
  }

  /* Brain framing: image determines size, canvas matches it pixel-for-pixel */
  .brain-frame {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    height: min(78vh, 110vw);
    z-index: 2;
  }
  .brain-image {
    height: 100%;
    width: auto;
    display: block;
    user-select: none;
    -webkit-user-drag: none;
    /* gentle floating bob */
    animation: bob 9s ease-in-out infinite;
    /* pull a touch of contrast & warmth without breaking the glass tone */
    filter: contrast(1.04) brightness(1.02) saturate(1.06);
  }
  .activity-layer {
    position: absolute;
    left: 0; top: 0;
    pointer-events: none;
    mix-blend-mode: screen;
    animation: bob 9s ease-in-out infinite;
  }
  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-8px); }
  }

  /* Soft halo behind the brain, painted in the page background */
  .halo {
    position: absolute;
    left: 50%; top: 50%;
    width: 70vh; height: 70vh;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(78,163,232,0.18) 0%, rgba(78,163,232,0.0) 60%);
    z-index: 1;
    pointer-events: none;
    filter: blur(20px);
  }

  /* Plate frame */
  .frame-overlay {
    position: absolute;
    inset: 22px;
    border: 1px solid rgba(251,236,209,0.10);
    pointer-events: none;
    z-index: 4;
  }
  .frame-overlay::after {
    content: "";
    position: absolute;
    inset: 6px;
    border: 1px solid rgba(251,236,209,0.05);
  }

  /* Top title */
  .title {
    position: absolute;
    top: 6vh; left: 0; right: 0;
    text-align: center;
    z-index: 5;
    pointer-events: none;
    color: rgba(251,236,209,0.85);
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 1rem;
    letter-spacing: 0.42em;
  }
  .title .sub {
    margin-top: 8px;
    font-size: 0.78rem;
    font-style: italic;
    letter-spacing: 0.06em;
    color: rgba(244,162,89,0.85);
  }

  /* Plate index marker */
  .specimen-mark {
    position: absolute;
    top: 6vh; right: 4vw;
    z-index: 5;
    color: rgba(155,196,245,0.5);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.78rem;
    text-align: right;
  }
  .specimen-mark .num {
    display: block;
    margin-top: 4px;
    font-style: normal;
    font-family: 'Inter', sans-serif;
    font-weight: 200;
    font-size: 0.55rem;
    letter-spacing: 0.32em;
    color: rgba(155,196,245,0.4);
  }

  /* Mode bar */
  .mode-bar {
    position: absolute;
    bottom: 4vh; left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    width: 100%;
    max-width: 900px;
    padding: 0 20px;
  }
  .modes {
    display: flex;
    gap: 4px;
    background: rgba(5,20,56,0.55);
    border: 1px solid rgba(155,196,245,0.18);
    padding: 4px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .mode-btn {
    background: none;
    border: 1px solid transparent;
    color: rgba(155,196,245,0.7);
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 0.66rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 10px 16px;
    cursor: pointer;
    transition: all 0.25s;
    white-space: nowrap;
  }
  .mode-btn:hover { color: var(--cream); }
  .mode-btn.active {
    background: rgba(247,108,78,0.18);
    color: var(--amber);
    border-color: rgba(244,162,89,0.42);
  }

  .mode-desc {
    text-align: center;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.92rem;
    color: rgba(251,236,209,0.7);
    transition: opacity 0.5s;
    min-height: 2.4em;
    max-width: 620px;
    line-height: 1.45;
  }

  /* Tiny missing-image fallback message */
  .missing-image {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center; justify-content: center;
    color: rgba(251,236,209,0.45);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.85rem;
    text-align: center;
    padding: 0 30px;
    line-height: 1.5;
  }
  .brain-frame.missing .missing-image { display: flex; }
  .brain-frame.missing .brain-image { opacity: 0; }

  /* Debug overlay: press 'd' to toggle region markers */
  body.debug .activity-layer { mix-blend-mode: normal; }
</style>
</head>
<body>
<div class="stage">

  <canvas class="snow-layer"></canvas>
  <div class="halo"></div>

  <div class="brain-frame" id="brain-frame">
    <img class="brain-image" id="brain-image" src="brain-glass.png" alt="Glass brain specimen">
    <canvas class="activity-layer" id="activity-layer"></canvas>
    <div class="missing-image">
      <div>
        Save your chosen glass-brain render to this folder<br>
        as <code style="font-family:Inter">brain-glass.png</code><br>
        and reload.
      </div>
    </div>
  </div>

  <div class="frame-overlay"></div>

  <div class="title">
    P E L A G I C &nbsp; S P E C I M E N
    <div class="sub">Plate I &middot; Encephalon, neural activity simulation</div>
  </div>

  <div class="specimen-mark">
    fig. 1
    <span class="num">A U T I S M &nbsp; D A T A &nbsp; A T L A S</span>
  </div>

  <div class="mode-bar">
    <div class="modes">
      <button class="mode-btn active" data-mode="typical">Typical</button>
      <button class="mode-btn" data-mode="ei">E/I imbalance</button>
      <button class="mode-btn" data-mode="seizure">Seizure wave</button>
      <button class="mode-btn" data-mode="mef2c">MEF2C dysfunction</button>
      <button class="mode-btn" data-mode="dmn">Default-mode</button>
    </div>
    <div class="mode-desc" id="mode-desc"></div>
  </div>

</div>

<script>
'use strict';

// ─────────── BRAIN REGION MAP ───────────
// Coordinates are normalized (0–1) to the brain image's bounding box.
// Press 'd' in the page to toggle region markers and tune these.
const REGIONS = {
  // Tuned to the actual brain-glass.png — three-quarter view, anterior LEFT.
  // y-axis: 0 = top of image, 1 = bottom.
  frontal_pole: { x: 0.18, y: 0.46, r: 24, type: 'cortex' },
  frontal_sup:  { x: 0.30, y: 0.36, r: 20, type: 'cortex' },
  precentral:   { x: 0.42, y: 0.34, r: 14, type: 'cortex' },
  central:      { x: 0.49, y: 0.33, r: 12, type: 'cortex' },
  postcentral:  { x: 0.55, y: 0.34, r: 14, type: 'cortex' },
  parietal:     { x: 0.64, y: 0.38, r: 20, type: 'cortex' },
  occipital:    { x: 0.78, y: 0.46, r: 20, type: 'cortex' },
  temporal_ant: { x: 0.27, y: 0.58, r: 18, type: 'cortex' },
  temporal_mid: { x: 0.42, y: 0.62, r: 17, type: 'cortex' },
  temporal_pos: { x: 0.56, y: 0.60, r: 15, type: 'cortex' },
  broca:        { x: 0.30, y: 0.52, r: 10, type: 'cortex' },
  wernicke:     { x: 0.53, y: 0.54, r: 10, type: 'cortex' },
  cerebellum:   { x: 0.74, y: 0.66, r: 22, type: 'cerebellum' },
  cingulate:    { x: 0.42, y: 0.46, r: 14, type: 'midline' },
  thalamus:     { x: 0.46, y: 0.55, r: 11, type: 'midline' },
  brain_stem:   { x: 0.60, y: 0.80, r:  9, type: 'subcortical' },
};

// Connections used for traveling-signal animations
const CONNECTIONS = [
  ['frontal_pole','broca'], ['broca','wernicke'],
  ['precentral','central'], ['central','postcentral'],
  ['postcentral','parietal'], ['parietal','occipital'],
  ['occipital','temporal_pos'], ['temporal_pos','temporal_mid'],
  ['temporal_mid','temporal_ant'], ['temporal_ant','broca'],
  ['cingulate','frontal_sup'], ['cingulate','parietal'],
  ['thalamus','cingulate'], ['precentral','brain_stem'],
  ['cerebellum','thalamus'], ['frontal_pole','cingulate'],
];

// ─────────── MODES ───────────
const MODES = {
  typical: {
    label: 'Typical',
    desc: 'Balanced excitatory and inhibitory activity. Roughly 70% excitatory firing, regulated by inhibitory interneurons across cortical regions.',
    fireRate: 0.7, excitatoryRatio: 0.70, signalRate: 0.45,
    waveActive: false, focalRegions: null, suppressedRegions: [],
    synchronized: false,
  },
  ei: {
    label: 'E/I imbalance',
    desc: 'Excitatory firing rises toward 90% of activity. Inhibitory pulses become sparse and weak. The pattern observed in autism cortical circuits.',
    fireRate: 1.0, excitatoryRatio: 0.92, signalRate: 0.7,
    waveActive: false, focalRegions: null, suppressedRegions: [],
    synchronized: false,
  },
  seizure: {
    label: 'Seizure wave',
    desc: 'Spreading hyper-excitation across the cortex — the failure mode of compromised E/I balance, observed when ion channels SCN2A, KCNB1, GRIN2A are disrupted.',
    fireRate: 0.5, excitatoryRatio: 1.0, signalRate: 0.3,
    waveActive: true, focalRegions: null, suppressedRegions: [],
    synchronized: false,
  },
  mef2c: {
    label: 'MEF2C dysfunction',
    desc: 'Targeted regional under-activation with compensatory firing in adjacent regions — the haploinsufficient cortical organoid pattern from Lipton, 2024.',
    fireRate: 0.7, excitatoryRatio: 0.7, signalRate: 0.32,
    waveActive: false, focalRegions: null,
    suppressedRegions: ['temporal_mid','parietal','wernicke'],
    compensatoryRegions: ['frontal_sup','occipital','broca'],
    synchronized: false,
  },
  dmn: {
    label: 'Default-mode network',
    desc: 'Resting-state synchronized activity in midline structures — medial prefrontal, posterior cingulate, precuneus. The brain at idle.',
    fireRate: 0.32, excitatoryRatio: 0.58, signalRate: 0.20,
    waveActive: false,
    focalRegions: ['frontal_pole','cingulate','parietal','temporal_pos'],
    suppressedRegions: ['precentral','central','postcentral'],
    synchronized: true, rhythm: 0.10,
  },
};

let currentMode = 'typical';

// ─────────── COLORS ───────────
const C = {
  excit:    { r: 247, g: 108, b:  78 },   // coral
  excitW:   { r: 244, g: 162, b:  89 },   // amber
  inhib:    { r:  78, g: 163, b: 232 },   // glow
  inhibD:   { r: 155, g: 196, b: 245 },   // mist
  midline:  { r: 251, g: 236, b: 209 },   // cream
  wave:     { r: 247, g: 108, b:  78 },   // coral
};

// ─────────── DOM / CANVAS ───────────
const brainFrame    = document.getElementById('brain-frame');
const brainImg      = document.getElementById('brain-image');
const activityCanvas = document.getElementById('activity-layer');
const snowCanvas    = document.querySelector('.snow-layer');
const ctx  = activityCanvas.getContext('2d');
const sctx = snowCanvas.getContext('2d');
const desc = document.getElementById('mode-desc');

// Detect missing image
brainImg.addEventListener('error', () => brainFrame.classList.add('missing'));

function resize() {
  const dpr = window.devicePixelRatio || 1;
  const r = brainImg.getBoundingClientRect();
  if (r.width > 0) {
    activityCanvas.style.width  = r.width + 'px';
    activityCanvas.style.height = r.height + 'px';
    activityCanvas.width  = Math.round(r.width * dpr);
    activityCanvas.height = Math.round(r.height * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  snowCanvas.width  = window.innerWidth * dpr;
  snowCanvas.height = window.innerHeight * dpr;
  sctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
brainImg.addEventListener('load', resize);
window.addEventListener('resize', resize);
resize();

function regionPos(name) {
  const r = REGIONS[name];
  const w = activityCanvas.clientWidth;
  const h = activityCanvas.clientHeight;
  return { x: r.x * w, y: r.y * h, r: r.r, region: r };
}

// ─────────── MARINE SNOW ───────────
const snowParticles = [];
for (let i = 0; i < 240; i++) {
  snowParticles.push({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    vy: 0.04 + Math.random() * 0.18,
    vx: (Math.random() - 0.5) * 0.05,
    r: 0.3 + Math.random() * 1.7,
    a: 0.15 + Math.random() * 0.45,
    seed: Math.random() * 1000,
  });
}
function drawSnow(t) {
  sctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
  for (const p of snowParticles) {
    p.y += p.vy;
    p.x += p.vx + Math.sin((t * 0.0002) + p.seed) * 0.06;
    if (p.y > window.innerHeight + 5) p.y = -5;
    if (p.x < -5) p.x = window.innerWidth + 5;
    if (p.x > window.innerWidth + 5) p.x = -5;
    sctx.fillStyle = `rgba(251,236,209,${p.a})`;
    sctx.beginPath();
    sctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    sctx.fill();
  }
}

// ─────────── ACTIVITY ENGINE ───────────
const neurons = [];
const signals = [];
let waveT = 0;

function spawnNeuron(name, type, intensity = 1) {
  const p = regionPos(name);
  const reg = REGIONS[name];
  const jx = (Math.random() - 0.5) * reg.r * 1.6;
  const jy = (Math.random() - 0.5) * reg.r * 1.0;
  let color;
  if (type === 'midline')        color = C.midline;
  else if (type === 'inhibitory') color = Math.random() < 0.6 ? C.inhib : C.inhibD;
  else                            color = Math.random() < 0.6 ? C.excit : C.excitW;
  neurons.push({
    x: p.x + jx, y: p.y + jy,
    radius: 4 + Math.random() * 9,
    color, intensity,
    age: 0,
    lifetime: 320 + Math.random() * 380,
  });
  if (neurons.length > 700) neurons.splice(0, 250);
}

function spawnSignal(from, to) {
  const a = regionPos(from), b = regionPos(to);
  signals.push({
    fromName: from, toName: to,
    x: a.x, y: a.y, tx: b.x, ty: b.y,
    progress: 0,
    speed: 0.5 + Math.random() * 0.6,
    color: Math.random() < 0.7 ? C.excit : C.inhib,
  });
  if (signals.length > 80) signals.splice(0, 30);
}

function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function updateActivity(dt, t) {
  const m = MODES[currentMode];
  const allNames = Object.keys(REGIONS);

  for (const name of allNames) {
    if (m.suppressedRegions && m.suppressedRegions.includes(name)) {
      if (Math.random() < 0.0006 * dt) spawnNeuron(name, 'inhibitory', 0.4);
      continue;
    }
    let baseRate = 0.0016 * m.fireRate;
    if (m.compensatoryRegions && m.compensatoryRegions.includes(name)) baseRate *= 1.9;
    if (m.focalRegions) {
      if (!m.focalRegions.includes(name)) baseRate *= 0.15;
      else baseRate *= 1.6;
    }
    if (m.synchronized) {
      const phase = (Math.sin(t * 0.001 * m.rhythm * 2 * Math.PI) + 1) / 2;
      baseRate *= (0.2 + phase * 1.3);
    }
    if (Math.random() < baseRate * dt) {
      const isExc = Math.random() < m.excitatoryRatio;
      let type;
      if (REGIONS[name].type === 'midline')    type = 'midline';
      else if (isExc)                          type = 'excitatory';
      else                                     type = 'inhibitory';
      spawnNeuron(name, type, 0.6 + Math.random() * 0.5);
    }
  }

  if (Math.random() < 0.025 * m.signalRate * dt && !m.waveActive) {
    const conn = pickRandom(CONNECTIONS);
    if (m.suppressedRegions && (m.suppressedRegions.includes(conn[0]) || m.suppressedRegions.includes(conn[1]))) {
      if (Math.random() < 0.2) spawnSignal(conn[0], conn[1]);
    } else {
      spawnSignal(conn[0], conn[1]);
    }
  }

  if (m.waveActive) {
    waveT += dt * 0.00055;
    if (waveT > 1.45) waveT = -0.25;
  } else {
    waveT = 0;
  }

  for (let i = neurons.length - 1; i >= 0; i--) {
    neurons[i].age += dt;
    if (neurons[i].age > neurons[i].lifetime) neurons.splice(i, 1);
  }

  for (let i = signals.length - 1; i >= 0; i--) {
    const s = signals[i];
    s.progress += s.speed * 0.012 * dt / 16;
    if (s.progress >= 1) {
      spawnNeuron(s.toName, 'excitatory', 0.85);
      signals.splice(i, 1);
    }
  }
}

function drawRegionalGlow(name, color, alpha, scale = 2.5) {
  const p = regionPos(name);
  const radius = REGIONS[name].r * scale;
  const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, radius);
  grad.addColorStop(0, `rgba(${color.r},${color.g},${color.b},${alpha})`);
  grad.addColorStop(1, `rgba(${color.r},${color.g},${color.b},0)`);
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
  ctx.fill();
}

function drawActivity(t) {
  const w = activityCanvas.clientWidth, h = activityCanvas.clientHeight;
  ctx.clearRect(0, 0, w, h);
  const m = MODES[currentMode];

  // Synchronized DMN bloom
  if (m.focalRegions && m.synchronized) {
    const phase = (Math.sin(t * 0.001 * m.rhythm * 2 * Math.PI) + 1) / 2;
    for (const name of m.focalRegions) {
      drawRegionalGlow(name, C.excitW, 0.18 * phase, 3 + phase * 1.5);
    }
  }

  // MEF2C compensatory flicker
  if (m.compensatoryRegions) {
    for (const name of m.compensatoryRegions) {
      const f = 0.5 + 0.5 * Math.sin(t * 0.01 + name.charCodeAt(0));
      drawRegionalGlow(name, C.excit, 0.13 * f, 2.6);
    }
  }

  // Suppressed cool glow
  if (m.suppressedRegions && m.suppressedRegions.length) {
    for (const name of m.suppressedRegions) {
      drawRegionalGlow(name, C.inhib, 0.10, 2.2);
    }
  }

  // Seizure spreading wave
  if (m.waveActive && waveT > 0) {
    const origin = regionPos('temporal_mid');
    const maxR = Math.max(w, h) * 0.95;
    const r1 = waveT * maxR;
    const r0 = Math.max(0, (waveT - 0.20) * maxR);
    const grad = ctx.createRadialGradient(origin.x, origin.y, r0, origin.x, origin.y, r1);
    grad.addColorStop(0,   'rgba(247,108,78,0)');
    grad.addColorStop(0.5, 'rgba(247,108,78,0.45)');
    grad.addColorStop(1,   'rgba(244,162,89,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(origin.x, origin.y, r1, 0, Math.PI * 2);
    ctx.fill();

    if (waveT > 0 && waveT < 1.25) {
      for (const name of Object.keys(REGIONS)) {
        const p = regionPos(name);
        const d = Math.hypot(p.x - origin.x, p.y - origin.y);
        if (Math.abs(d - r1 * 0.7) < 36 && Math.random() < 0.45) {
          spawnNeuron(name, 'excitatory', 1.25);
        }
      }
    }
  }

  // Neurons
  for (const n of neurons) {
    const t01 = n.age / n.lifetime;
    let alpha = t01 < 0.15 ? t01 / 0.15 : 1 - (t01 - 0.15) / 0.85;
    alpha = Math.max(0, alpha) * n.intensity;
    const radius = n.radius * (0.5 + alpha * 0.7);
    const grad = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, radius * 3.2);
    const c = n.color;
    grad.addColorStop(0,   `rgba(${c.r},${c.g},${c.b},${alpha * 0.95})`);
    grad.addColorStop(0.4, `rgba(${c.r},${c.g},${c.b},${alpha * 0.40})`);
    grad.addColorStop(1,   `rgba(${c.r},${c.g},${c.b},0)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(n.x, n.y, radius * 3.2, 0, Math.PI * 2);
    ctx.fill();
  }

  // Signals (comet trails)
  for (const s of signals) {
    const cx = s.x + (s.tx - s.x) * s.progress;
    const cy = s.y + (s.ty - s.y) * s.progress;
    const tailX = s.x + (s.tx - s.x) * Math.max(0, s.progress - 0.20);
    const tailY = s.y + (s.ty - s.y) * Math.max(0, s.progress - 0.20);
    const grad = ctx.createLinearGradient(tailX, tailY, cx, cy);
    grad.addColorStop(0, `rgba(${s.color.r},${s.color.g},${s.color.b},0)`);
    grad.addColorStop(1, `rgba(${s.color.r},${s.color.g},${s.color.b},0.7)`);
    ctx.strokeStyle = grad;
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(tailX, tailY);
    ctx.lineTo(cx, cy);
    ctx.stroke();
    const headGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 11);
    headGrad.addColorStop(0, `rgba(${s.color.r},${s.color.g},${s.color.b},0.95)`);
    headGrad.addColorStop(1, `rgba(${s.color.r},${s.color.g},${s.color.b},0)`);
    ctx.fillStyle = headGrad;
    ctx.beginPath();
    ctx.arc(cx, cy, 11, 0, Math.PI * 2);
    ctx.fill();
  }

  // ── CLIP TO BRAIN: use the brain image's alpha channel as a mask
  // Everything painted above gets erased outside the brain silhouette.
  // Requires a transparent PNG; with an opaque image this is a no-op.
  if (brainImg.complete && brainImg.naturalWidth > 0) {
    ctx.globalCompositeOperation = 'destination-in';
    ctx.drawImage(brainImg, 0, 0, w, h);
    ctx.globalCompositeOperation = 'source-over';
  }

  // Debug region markers (drawn AFTER clip so they're always visible)
  if (document.body.classList.contains('debug')) {
    ctx.strokeStyle = 'rgba(251,236,209,0.6)';
    ctx.fillStyle = 'rgba(251,236,209,0.85)';
    ctx.font = '10px Inter';
    for (const name of Object.keys(REGIONS)) {
      const p = regionPos(name);
      ctx.beginPath();
      ctx.arc(p.x, p.y, REGIONS[name].r, 0, Math.PI * 2);
      ctx.stroke();
      ctx.fillText(name, p.x + 6, p.y - 6);
    }
  }
}

// ─────────── MODE SWITCHING ───────────
function setMode(name) {
  currentMode = name;
  document.querySelectorAll('.mode-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === name);
  });
  desc.style.opacity = '0';
  setTimeout(() => {
    desc.textContent = MODES[name].desc;
    desc.style.opacity = '1';
  }, 200);
}
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => setMode(btn.dataset.mode));
});
setMode('typical');

// Press 'd' to show region markers for tuning coordinates to your image
document.addEventListener('keydown', (e) => {
  if (e.key === 'd' || e.key === 'D') document.body.classList.toggle('debug');
});

// ─────────── MAIN LOOP ───────────
let lastT = performance.now();
function loop(t) {
  const dt = Math.min(50, t - lastT);
  lastT = t;
  drawSnow(t);
  updateActivity(dt, t);
  drawActivity(t);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
